version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: my_postgres
    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: my_db
    ports:
      - "5432:5432"
    volumes:
      - ./data:/data
      - ./init-sql:/docker-entrypoint-initdb.d
    networks:
      - app-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8.4
    container_name: clickhouse
    ports:
      - "8123:8123"    
    environment:
      CLICKHOUSE_USER: click
      CLICKHOUSE_PASSWORD: click
      CLICKHOUSE_DB: mydatabase
    volumes:
      - ./data:/data
      - ./init-ch:/docker-entrypoint-initdb.d
    networks:
      - app-network

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark
    depends_on:
      - postgres
      - clickhouse
    volumes:
      - ./spark_apps:/opt/spark/apps
      - ./data:/opt/spark/apps/data
    networks:
      - app-network
    ports:
      - "8080:8080"  # Spark UI
      - "8888:8888"  # JupyterLab

networks:
  app-network: